<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Doğrulandı — İmece Düğün</title>
    
    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Material+Icons+Round&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti CDN -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-champagne: #FAF8F6;
            --text-main: #1D1D1F;
            --text-muted: #515154;
            --gold: #C5A059;
            --gold-light: #F4ECE1;
            --radius-lg: 16px;
            --font-body: 'Inter', sans-serif;
            --font-heading: 'Playfair Display', serif;
        }

        body {
            background-color: var(--bg-champagne);
            color: var(--text-main);
            font-family: var(--font-body);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .success-card {
            background-color: #ffffff;
            border-radius: var(--radius-lg);
            padding: 50px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            border: 1px solid #EAE6E2;
            transform: translateY(20px);
            opacity: 0;
            animation: cardEntrance 0.8s ease forwards;
        }

        @keyframes cardEntrance {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .icon-wrapper {
            position: relative;
            width: 72px;
            height: 72px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: var(--gold-light);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            animation: pulseGlow 2s infinite alternate ease-in-out;
        }

        .icon-circle span {
            color: var(--gold);
            font-size: 2.2rem;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.2); }
            100% { transform: scale(1.05); box-shadow: 0 0 20px 8px rgba(197, 160, 89, 0.35); }
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 16px;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin: 0 0 35px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 14px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
            display: inline-block;
        }

        .btn-primary {
            background-color: var(--gold);
            color: #ffffff;
            border: 2px solid transparent;
            box-shadow: 0 8px 24px rgba(197, 160, 89, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
        }

        .btn-primary:hover::before {
            animation: shineSweep 0.85s ease-in-out forwards;
        }

        @keyframes shineSweep {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        .btn-primary:hover {
            background-color: hsl(40, 52%, 48%);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(197, 160, 89, 0.35);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--gold);
        }

        .btn-outline:hover {
            background-color: var(--gold-light);
            transform: translateY(-2px);
        }

        .footer-note {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #A1A1A5;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-wrapper">
            <div class="icon-circle">
                <span class="material-icons-round">favorite</span>
            </div>
        </div>
        
        <h1>Hesabınız Doğrulandı!</h1>
        <p>Tebrikler, e-posta adresiniz başarıyla onaylandı. İmece Düğün ile hazırlıklarınızı sevdiklerinizle birlikte keyifle planlamaya hazırsınız.</p>
        
        <div class="btn-group">
            <!-- Mobile app deep link redirection -->
            <a href="imecedugun://login-callback" class="btn btn-primary">Uygulamadan Erişebilirsiniz</a>
            <a href="index.html" class="btn btn-outline">Ana Sayfaya Dön</a>
        </div>
        
        <div class="footer-note">
            © 2026 İmece Düğün. Tüm hakları saklıdır.
        </div>
    </div>

    <script>
        // Trigger confetti explosion on screen load
        window.addEventListener('load', () => {
            const duration = 2.5 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#C5A059', '#EAD0D0', '#754B4B']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#C5A059', '#EAD0D0', '#754B4B']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        });
    </script>
</body>
</html>
